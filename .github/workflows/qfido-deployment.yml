name: Validate qFido deployment

on:
  pull_request:
    paths:
      - "charts/inbox-zero/**"
      - "deploy/qfido/**"
      - "inventory/qfido-live-state-2026-07-21.yaml"
      - "docs/operations/qfido-kubernetes.md"
      - "docs/recovery/qfido-kubernetes.md"
      - "scripts/validate-qfido-deployment.sh"
      - ".github/workflows/qfido-deployment.yml"
  push:
    branches: [main]
    paths:
      - "charts/inbox-zero/**"
      - "deploy/qfido/**"
      - "inventory/qfido-live-state-2026-07-21.yaml"
      - "docs/operations/qfido-kubernetes.md"
      - "docs/recovery/qfido-kubernetes.md"
      - "scripts/validate-qfido-deployment.sh"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: SKIP_GITLEAKS=1 bash scripts/validate-qfido-deployment.sh
