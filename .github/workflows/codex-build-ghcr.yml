name: Codex Build GHCR Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to publish
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build amd64 image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.prod
          platforms: linux/amd64
          push: true
          build-args: |
            INSTALL_CODEX_CLI=true
            CODEX_CLI_VERSION=0.142.4
          tags: |
            ghcr.io/${{ github.repository_owner }}/inbox-zero:${{ inputs.tag }}
            ghcr.io/${{ github.repository_owner }}/inbox-zero:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
