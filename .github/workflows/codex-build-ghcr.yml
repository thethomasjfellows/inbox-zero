name: Codex Build immutable GHCR image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/thethomasjfellows/inbox-zero

jobs:
  build:
    name: Build amd64 image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Select immutable SHA tag
        id: image
        shell: bash
        run: echo "tag=sha-${GITHUB_SHA:0:12}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}
      - name: Refuse immutable tag overwrite
        run: |
          if docker buildx imagetools inspect "$IMAGE:${{ steps.image.outputs.tag }}" >/dev/null 2>&1; then
            echo "Refusing to overwrite existing immutable tag." >&2
            exit 1
          fi
      - name: Build and push
        id: publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.prod
          platforms: linux/amd64
          push: true
          build-args: |
            INSTALL_CODEX_CLI=true
            CODEX_CLI_VERSION=0.142.4
          tags: ${{ env.IMAGE }}:${{ steps.image.outputs.tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Record digest
        run: echo "Published $IMAGE:${{ steps.image.outputs.tag }} at ${{ steps.publish.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
